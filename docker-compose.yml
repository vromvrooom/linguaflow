services:
  postgres:
    image: postgres:16-alpine
    container_name: linguaflow_postgres
    restart: always
    environment:
      POSTGRES_USER: linguaflow
      POSTGRES_PASSWORD: linguaflow_secret
      POSTGRES_DB: linguaflow_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - linguaflow_network

  redis:
    image: redis:7-alpine
    container_name: linguaflow_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - linguaflow_network

  backend:
    build: ./backend
    container_name: linguaflow_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://linguaflow:linguaflow_secret@postgres:5432/linguaflow_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production_use_long_random_string
      DEEPL_API_KEY: aba2dc9d-eb67-464f-b393-5d3dc6d2f01c:fx
      PORT: 4000
      NODE_ENV: production
    depends_on:
      - postgres
      - redis
    networks:
      - linguaflow_network

  webapp:
    build: ./webapp
    container_name: linguaflow_webapp
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: http://194.28.84.152/api
    depends_on:
      - backend
    networks:
      - linguaflow_network

  nginx:
    image: nginx:alpine
    container_name: linguaflow_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - webapp
    networks:
      - linguaflow_network

  prometheus:
    image: prom/prometheus:latest
    container_name: linguaflow_prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=http://194.28.84.152/prometheus/"
      - "--web.route-prefix=/"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - linguaflow_network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: linguaflow_node_exporter
    restart: always
    networks:
      - linguaflow_network

  grafana:
    image: grafana/grafana:latest
    container_name: linguaflow_grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://194.28.84.152:3001
    networks:
      - linguaflow_network

volumes:
  postgres_data:
  redis_data:

networks:
  linguaflow_network:
    driver: bridge
