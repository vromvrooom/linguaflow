services:
  postgres:
    image: postgres:16-alpine
    container_name: linguaflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linguaflow
      POSTGRES_PASSWORD: linguaflow_secret
      POSTGRES_DB: linguaflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: linguaflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: linguaflow_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://linguaflow:linguaflow_secret@postgres:5432/linguaflow_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  webapp:
    build: ./webapp
    container_name: linguaflow_webapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NODE_ENV: development
    volumes:
      - ./webapp:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: