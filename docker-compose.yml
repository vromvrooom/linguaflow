services:
  postgres:
    image: postgres:16-alpine
    container_name: linguaflow_postgres
    restart: always
    environment:
      POSTGRES_USER: linguaflow
      POSTGRES_PASSWORD: linguaflow_secret
      POSTGRES_DB: linguaflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - linguaflow_network

  redis:
    image: redis:7-alpine
    container_name: linguaflow_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - linguaflow_network

  backend:
    build: ./backend
    container_name: linguaflow_backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://linguaflow:linguaflow_secret@postgres:5432/linguaflow_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change_me_in_production
      NODE_ENV: production
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - linguaflow_network

  webapp:
    build: ./webapp
    container_name: linguaflow_webapp
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://194.28.84.152:4000
      NODE_ENV: production
    depends_on:
      - backend
    networks:
      - linguaflow_network

  nginx:
    image: nginx:alpine
    container_name: linguaflow_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - webapp
      - backend
    networks:
      - linguaflow_network

volumes:
  postgres_data:
  redis_data:

networks:
  linguaflow_network:
    driver: bridge
